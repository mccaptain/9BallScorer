<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>APA 9-Ball Scorer</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" href="./icon-192x192.png" />
    <meta name="theme-color" content="#0d1f0d" />
    <meta name="description" content="APA 9-Ball match scoring app" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="9-Ball" />
    <style id="expo-reset">
      html, body { height: 100%; margin: 0; }
      body { overflow: hidden; background: #0d1f0d; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
  </head>
  <body>
    <script>
      (function() {
        var key = 'apa-scorer-accessibility-theme';
        var bgMap = { green: '#0d1f0d', monokai: '#272822', dark: '#1a1a1a' };
        var theme = (function(){ try { return localStorage.getItem(key); } catch(e) {} })() || 'green';
        var bg = bgMap[theme] || '#0d1f0d';
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = bg;
        document.body.style.background = bg;
      })();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js');
        });
      }
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
